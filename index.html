<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>arcus — ode triunfal</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #060606;
                --text: #f4f4f4;
                --muted: #8a8a8a;
                --dim: #5a5a5a;
                --line: #1a1a1a;
                --guide: #2e2e2e;
                --mono:
                    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--mono);
                font-size: 14px;
                line-height: 1.8;
                -webkit-font-smoothing: antialiased;
            }

            #term {
                height: 100%;
                width: 100%;
                overflow-y: auto;
                padding: clamp(20px, 5vw, 48px);
            }

            /* barely-there top marks */
            .topmark {
                position: fixed;
                top: clamp(18px, 4vw, 28px);
                z-index: 5;
                font-size: 12px;
                letter-spacing: 0.04em;
                color: var(--dim);
            }
            .topmark.left {
                left: clamp(20px, 5vw, 48px);
            }
            .topmark.left .brand {
                color: var(--muted);
                font-weight: 500;
            }
            /* cryptic challenge marker — hex 0x01 = challenge one, for those who read it */
            .topmark.right {
                right: clamp(20px, 5vw, 48px);
                color: #3a3a3a;
                letter-spacing: 0.18em;
                transition: color 0.4s ease;
            }
            .topmark.right:hover {
                color: var(--dim);
            }

            .wrap {
                max-width: 720px;
                margin: 0 auto;
                min-height: calc(100% - 40px);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 48px 0 64px;
            }

            /* ── the arcus mark: an arch, drawn in a square+circle frame ── */
            .mark {
                width: clamp(220px, 30vh, 280px);
                height: auto;
                margin-bottom: 34px;
                overflow: visible;
            }
            .mark .guides {
                opacity: 0;
                animation: fade 1.6s ease forwards 0.15s;
            }
            .mark .guides * {
                fill: none;
                stroke: var(--guide);
                stroke-width: 1;
                stroke-dasharray: 3 7;
            }
            .mark .spin {
                transform-origin: 200px 200px;
                animation: spin 60s linear infinite;
            }

            .mark .build * {
                fill: none;
                stroke: var(--text);
                stroke-width: 1.6;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            .mark .arch {
                stroke-dasharray: 5 6;
                transform-box: fill-box;
                transform-origin: center;
                animation:
                    rise 1s cubic-bezier(0.2, 0.7, 0.2, 1) both 0.35s,
                    march 2.6s linear infinite;
            }
            .mark .nodes circle {
                stroke-dasharray: 4 5;
                transform-box: fill-box;
                transform-origin: center;
                animation:
                    pop 0.55s cubic-bezier(0.2, 0.85, 0.25, 1) both,
                    march 2.6s linear infinite;
            }
            .mark .nodes circle:nth-of-type(1) {
                animation-delay: 0.85s, 0s;
            }
            .mark .nodes circle:nth-of-type(2) {
                animation-delay: 1s, 0s;
            }
            .mark .nodes circle:nth-of-type(3) {
                animation-delay: 1s, 0s;
            }
            .mark .nodes circle:nth-of-type(4) {
                animation-delay: 1.15s, 0s;
            }
            .mark .nodes circle:nth-of-type(5) {
                animation-delay: 1.15s, 0s;
            }

            @keyframes fade {
                to {
                    opacity: 1;
                }
            }
            @keyframes march {
                to {
                    stroke-dashoffset: -26;
                }
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(10px) scale(0.96);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }
            @keyframes pop {
                from {
                    opacity: 0;
                    transform: scale(0);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            /* ── text (terminal output style) ── */
            #lines {
                display: inline-block;
                text-align: left;
            }
            .line {
                white-space: pre-wrap;
                min-height: 1.8em;
                color: var(--muted);
            }
            .line:first-child {
                margin-bottom: 12px;
            }
            .line .pl {
                color: var(--dim);
                margin-right: 9px;
            }
            .line .hl {
                color: var(--text);
                letter-spacing: 0.04em;
            }

            .cursor {
                display: inline-block;
                width: 8px;
                height: 1.05em;
                background: var(--text);
                vertical-align: text-bottom;
                margin-left: 2px;
                animation: blink 1.05s step-end infinite;
            }
            @keyframes blink {
                50% {
                    opacity: 0;
                }
            }

            /* ── command: framed with technical crop-marks, no chrome ── */
            .cmd {
                position: relative;
                margin-top: 34px;
                display: inline-flex;
                align-items: center;
                gap: 14px;
                padding: 18px 30px;
                cursor: pointer;
                user-select: none;
                opacity: 0;
                transform: translateY(8px);
                transition:
                    opacity 0.5s ease,
                    transform 0.5s ease;
            }
            .cmd.show {
                opacity: 1;
                transform: translateY(0);
            }
            .cmd .corner {
                position: absolute;
                width: 13px;
                height: 13px;
                border: 1px dashed var(--guide);
                transition:
                    width 0.2s ease,
                    height 0.2s ease,
                    border-color 0.2s ease;
            }
            .cmd .tl {
                top: 0;
                left: 0;
                border-right: none;
                border-bottom: none;
            }
            .cmd .tr {
                top: 0;
                right: 0;
                border-left: none;
                border-bottom: none;
            }
            .cmd .bl {
                bottom: 0;
                left: 0;
                border-right: none;
                border-top: none;
            }
            .cmd .br {
                bottom: 0;
                right: 0;
                border-left: none;
                border-top: none;
            }
            .cmd:hover .corner {
                width: 17px;
                height: 17px;
                border-color: var(--dim);
            }
            .cmd.copied .corner {
                border-color: var(--muted);
            }

            .cmd .ps {
                color: var(--dim);
            }
            .cmd .text {
                color: var(--text);
                font-size: 15px;
                letter-spacing: 0.02em;
            }
            .cmd .ccur {
                display: inline-block;
                width: 8px;
                height: 1.05em;
                background: var(--muted);
                margin-left: 1px;
                vertical-align: text-bottom;
                animation: blink 1.05s step-end infinite;
            }
            .cmd .label {
                margin-left: 6px;
                font-size: 10.5px;
                letter-spacing: 0.14em;
                color: var(--dim);
                transition: color 0.2s ease;
            }
            .cmd:hover .label {
                color: var(--muted);
            }
            .cmd.copied .label {
                color: var(--text);
            }

            .foot {
                margin-top: 26px;
                color: var(--dim);
                font-size: 12.5px;
                opacity: 0;
                transition: opacity 0.6s ease;
            }
            .foot.show {
                opacity: 1;
            }

            @media (prefers-reduced-motion: reduce) {
                .mark *,
                .cmd,
                .foot {
                    animation: none !important;
                    transition: none !important;
                }
                .mark .guides,
                .mark .arch,
                .mark .nodes circle,
                .cmd,
                .foot {
                    opacity: 1;
                    transform: none;
                }
            }
        </style>
    </head>
    <body>
        <div id="term">
            <div class="topmark left"><span class="brand">arcus</span></div>
            <div class="topmark right" title="">0x01</div>

            <div class="wrap">
                <!-- arcus mark: an arch (arcus = arch/bow), built on a square + circle frame -->
                <svg class="mark" viewBox="0 0 400 400" aria-label="arcus">
                    <g class="guides">
                        <rect x="60" y="60" width="280" height="280" />
                        <circle cx="200" cy="200" r="140" />
                        <circle class="spin" cx="200" cy="200" r="90" />
                        <line x1="200" y1="40" x2="200" y2="360" />
                        <line x1="40" y1="200" x2="360" y2="200" />
                        <line x1="130" y1="60" x2="130" y2="340" />
                        <line x1="270" y1="60" x2="270" y2="340" />
                        <line x1="60" y1="290" x2="340" y2="290" />
                        <line x1="60" y1="60" x2="340" y2="340" />
                        <line x1="340" y1="60" x2="60" y2="340" />
                    </g>

                    <g class="build">
                        <!-- the arch: two legs rising to a semicircular crown -->
                        <path
                            class="arch"
                            d="M110 300 L110 200 A90 90 0 0 1 290 200 L290 300"
                        />
                        <g class="nodes">
                            <circle cx="200" cy="110" r="15" />
                            <!-- crown / keystone -->
                            <circle cx="110" cy="200" r="13" />
                            <!-- left springline -->
                            <circle cx="290" cy="200" r="13" />
                            <!-- right springline -->
                            <circle cx="110" cy="300" r="13" />
                            <!-- left base -->
                            <circle cx="290" cy="300" r="13" />
                            <!-- right base -->
                        </g>
                    </g>
                </svg>

                <div id="lines"></div>

                <div class="cmd" id="cmd" title="click to copy">
                    <span class="corner tl"></span
                    ><span class="corner tr"></span>
                    <span class="corner bl"></span
                    ><span class="corner br"></span>
                    <span class="ps">$</span>
                    <span class="text" id="cmd-text"></span
                    ><span class="ccur"></span>
                    <span class="label" id="label">COPY</span>
                </div>

                <div class="foot" id="foot">
                    no account needed · run the command to enter
                </div>
            </div>
        </div>

        <script>
            (function () {
                const SSH_COMMAND = "ssh arcus.sh";

                const LINES = [
                    '<span class="hl">ode triunfal</span>',
                    "the first arcus trial.",
                    "copy the command to enter.",
                ];

                const linesEl = document.getElementById("lines");
                const cmdBox = document.getElementById("cmd");
                const cmdText = document.getElementById("cmd-text");
                const label = document.getElementById("label");
                const foot = document.getElementById("foot");
                const wait = (ms) => new Promise((r) => setTimeout(r, ms));

                async function typeLine(target, html, speed) {
                    const tmp = document.createElement("div");
                    tmp.innerHTML = html;
                    const plain = tmp.textContent;
                    const cursor = document.createElement("span");
                    cursor.className = "cursor";
                    target.appendChild(cursor);
                    for (const ch of plain) {
                        cursor.insertAdjacentText("beforebegin", ch);
                        await wait(speed);
                    }
                    cursor.remove();
                    target.innerHTML = html;
                }

                async function run() {
                    await wait(1600); // let the arch assemble first
                    for (const html of LINES) {
                        const div = document.createElement("div");
                        div.className = "line";
                        const pl = document.createElement("span");
                        pl.className = "pl";
                        pl.textContent = ">";
                        const tx = document.createElement("span");
                        tx.className = "tx";
                        div.append(pl, " ", tx);
                        linesEl.appendChild(div);
                        await typeLine(tx, html, 16);
                        await wait(160);
                    }
                    await wait(250);
                    cmdText.textContent = SSH_COMMAND;
                    cmdBox.classList.add("show");
                    await wait(420);
                    foot.classList.add("show");
                }

                async function copy() {
                    try {
                        await navigator.clipboard.writeText(SSH_COMMAND);
                    } catch (e) {
                        const ta = document.createElement("textarea");
                        ta.value = SSH_COMMAND;
                        ta.style.position = "fixed";
                        ta.style.opacity = "0";
                        document.body.appendChild(ta);
                        ta.select();
                        try {
                            document.execCommand("copy");
                        } catch (_) {}
                        ta.remove();
                    }
                    cmdBox.classList.add("copied");
                    label.textContent = "COPIED";
                    clearTimeout(copy._t);
                    copy._t = setTimeout(() => {
                        cmdBox.classList.remove("copied");
                        label.textContent = "COPY";
                    }, 1600);
                }
                cmdBox.addEventListener("click", copy);

                run();
            })();
        </script>
    </body>
</html>
