<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>arcus — ode triunfal</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #080a0b;
                --text: #f4f4f4;
                --muted: #8a8a8a;
                --dim: #5a5a5a;
                --line: #1a1a1a;
                --guide: #2e2e2e;
                --mono:
                    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
                overscroll-behavior: none;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            html::-webkit-scrollbar,
            body::-webkit-scrollbar,
            #term::-webkit-scrollbar {
                display: none;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--mono);
                font-size: 14px;
                line-height: 1.8;
                -webkit-font-smoothing: antialiased;
            }

            #term {
                height: 100%;
                width: 100%;
                overflow-y: auto;
                overscroll-behavior: none;
                padding: 0 0 clamp(20px, 5vw, 56px);
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            /* left-anchored terminal column with a stable start position */
            .wrap {
                max-width: 860px;
                min-height: 100%;
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                justify-content: flex-start;
                text-align: left;
                padding: 30px 0 64px;
            }

            /* small arch mark, top-left of the column */
            /* negative margin aligns the guide square with the embed edge */
            .mark {
                --mark-size: 185px;
                width: var(--mark-size);
                max-width: 100%;
                height: auto;
                margin-bottom: 30px;
                margin-left: calc((var(--mark-size) * -0.15) + 2px);
                overflow: visible;
            }
            .mark .guides {
                opacity: 0;
                animation: fade 1.6s ease forwards 0.15s;
            }
            .mark .guides * {
                fill: none;
                stroke: #565656;
                stroke-width: 1.2;
                stroke-dasharray: 3 7;
            }
            .mark .build * {
                fill: none;
                stroke: var(--text);
                stroke-width: 1.6;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            .mark .arch {
                stroke-dasharray: 5 6;
                transform-box: fill-box;
                transform-origin: center;
                animation:
                    rise 1s cubic-bezier(0.2, 0.7, 0.2, 1) both 0.35s,
                    march-arch 2.6s linear infinite;
            }
            .mark .nodes circle {
                stroke-dasharray: 4 5;
                transform-box: fill-box;
                transform-origin: center;
                animation:
                    pop 0.55s cubic-bezier(0.2, 0.85, 0.25, 1) both,
                    march-node 2.6s linear infinite;
            }
            .mark .nodes circle:nth-of-type(1) {
                animation-delay: 0.85s, 0s;
            }
            .mark .nodes circle:nth-of-type(2) {
                animation-delay: 1s, 0s;
            }
            .mark .nodes circle:nth-of-type(3) {
                animation-delay: 1s, 0s;
            }
            .mark .nodes circle:nth-of-type(4) {
                animation-delay: 1.15s, 0s;
            }
            .mark .nodes circle:nth-of-type(5) {
                animation-delay: 1.15s, 0s;
            }

            @keyframes fade {
                to {
                    opacity: 1;
                }
            }
            @keyframes march-arch {
                to {
                    stroke-dashoffset: -22;
                }
            }
            @keyframes march-node {
                to {
                    stroke-dashoffset: -18;
                }
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(10px) scale(0.96);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }
            @keyframes pop {
                from {
                    opacity: 0;
                    transform: scale(0);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }
            /* arrow draws back: slides in from the bow toward the nock */
            @keyframes draw {
                from {
                    opacity: 0;
                    transform: translateX(-16px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            @keyframes blink {
                50% {
                    opacity: 0;
                }
            }

            /* terminal output lines */
            .line {
                white-space: pre-wrap;
                min-height: 1.7em;
                color: var(--muted);
                font-size: 13px;
            }
            .line .pl {
                color: var(--dim);
                margin-right: 10px;
            }
            .line .hl {
                color: var(--text);
                letter-spacing: 0.04em;
            }
            .line.title {
                margin: 20px 0 16px;
            }
            .line.title .pl {
                color: var(--dim);
                font-size: 11px;
                letter-spacing: 0.14em;
                margin-right: 10px;
            }
            .line.title .tx {
                color: var(--text);
                letter-spacing: 0.05em;
            }
            .line.ssh-copy,
            .terminal-line.ssh-copy {
                cursor: pointer;
                user-select: none;
            }
            .line.ssh-copy .hint,
            .terminal-line.ssh-copy .hint {
                margin-left: 12px;
                color: var(--dim);
                opacity: 0;
                transition: opacity 0.18s ease, color 0.18s ease;
            }
            .line.ssh-copy:hover:not(.copied):not(.copy-cooldown) .hint,
            .terminal-line.ssh-copy:hover:not(.copied):not(.copy-cooldown) .hint {
                color: var(--muted);
                opacity: 1;
            }
            .line.ssh-copy.copied .hint,
            .terminal-line.ssh-copy.copied .hint {
                color: var(--text);
                opacity: 1;
            }

            /* prize / time-left info lines */
            .line.info .k {
                color: var(--muted);
                display: inline-block;
                width: 96px;
            }
            .line.info .v {
                color: var(--text);
            }

            .cursor {
                display: inline-block;
                width: 8px;
                height: 1.05em;
                background: var(--text);
                vertical-align: text-bottom;
                margin-left: 2px;
                animation: blink 1.05s step-end infinite;
            }

            /* the command — a real prompt line, no box */
            .cmd {
                margin-top: 30px;
                font-size: 13px;
                display: inline-flex;
                align-items: center;
                gap: 12px;
                cursor: pointer;
                user-select: none;
                opacity: 0;
                transform: translateY(6px);
                transition:
                    opacity 0.5s ease,
                    transform 0.5s ease;
            }
            .cmd.show {
                opacity: 1;
                transform: translateY(0);
            }
            .cmd .ps {
                color: var(--dim);
            }
            .cmd .ps b {
                color: var(--muted);
                font-weight: 500;
            }
            .cmd .text {
                color: var(--text);
                letter-spacing: 0.02em;
            }
            .cmd .ccur {
                display: inline-block;
                width: 8px;
                height: 1.05em;
                background: var(--muted);
                margin-left: -4px;
                vertical-align: text-bottom;
                animation: blink 1.05s step-end infinite;
            }
            .cmd .label {
                margin-left: 8px;
                font-size: 11px;
                letter-spacing: 0.12em;
                color: var(--dim);
                transition: color 0.2s ease;
            }
            .cmd:hover .label {
                color: var(--muted);
            }
            .cmd.copied .label {
                color: var(--text);
            }

            .terminal-shell {
                margin-top: 30px;
                width: min(860px, 100vw);
                color: var(--muted);
                font-size: 13px;
                opacity: 0;
                transform: translateY(4px);
                transition:
                    opacity 0.45s ease,
                    transform 0.45s ease;
            }
            .terminal-shell.show {
                opacity: 1;
                transform: none;
            }
            .terminal-history {
                display: flex;
                flex-direction: column;
                gap: 18px;
            }
            .terminal-history:not(:empty) + .terminal-input-row {
                margin-top: 18px;
            }
            .terminal-echo,
            .terminal-input-row {
                display: flex;
                align-items: baseline;
                gap: 0;
                min-height: 1.7em;
            }
            .terminal-prompt {
                color: var(--dim);
                flex: 0 0 auto;
                font-size: 11px;
                letter-spacing: 0.14em;
                margin-right: 18px;
            }
            .terminal-command,
            .terminal-input {
                color: var(--text);
                letter-spacing: 0.05em;
            }
            .terminal-input {
                flex: 1;
                min-width: 140px;
                border: 0;
                outline: 0;
                background: transparent;
                font: inherit;
                line-height: inherit;
                caret-color: var(--text);
            }
            .terminal-input::placeholder {
                color: #3f3f3f;
            }
            .terminal-output {
                margin-left: 28px;
            }
            .terminal-heading {
                color: var(--text);
                margin-bottom: 10px;
                letter-spacing: 0.02em;
            }
            .terminal-heading .slash {
                color: #d8a948;
            }
            .terminal-list {
                display: grid;
                grid-template-columns: minmax(120px, 220px) minmax(220px, 1fr);
                column-gap: 34px;
                row-gap: 1px;
            }
            .terminal-list .cmd-name {
                color: var(--text);
            }
            .terminal-list .accent {
                color: #d96a62;
            }
            .terminal-note {
                margin-top: 8px;
                color: var(--dim);
            }
            .terminal-block {
                display: flex;
                flex-direction: column;
                gap: 0;
            }
            .terminal-line {
                color: var(--muted);
                max-width: 860px;
                min-height: 1.7em;
                white-space: pre-wrap;
            }
            .terminal-line .pl {
                color: var(--dim);
                margin-right: 18px;
            }
            .terminal-line.ssh-copy .pl {
                font-size: 11px;
                letter-spacing: 0.14em;
                margin-right: 10px;
            }
            .terminal-line.ssh-copy .tx {
                color: var(--text);
                letter-spacing: 0.05em;
            }
            .terminal-line .w,
            .terminal-line a {
                color: var(--text);
            }
            .terminal-line a {
                text-decoration: none;
                border-bottom: 1px dotted #555;
            }
            .terminal-prize {
                display: grid;
                grid-template-columns: 152px 68px minmax(150px, 1fr);
                column-gap: 6px;
                align-items: baseline;
            }
            .terminal-prize span {
                white-space: nowrap;
            }
            .terminal-prize .amount {
                color: var(--text);
            }
            .terminal-error {
                color: #b76b6b;
            }
            .terminal-ascii {
                margin: 0;
                color: var(--text);
                font: inherit;
                line-height: 1.05;
                letter-spacing: 0;
                white-space: pre;
                text-shadow: 0 0 12px rgba(245, 245, 245, 0.16);
            }
            .kcaret {
                display: inline-block;
                width: 0;
                height: 1.05em;
                background: var(--text);
                vertical-align: text-bottom;
                opacity: 0;
            }
            .kcaret.show {
                width: 7px;
                margin: 0 1px;
                opacity: 1;
                animation: blink 1.05s step-end infinite;
            }

            @media (max-width: 360px) {
                .terminal-list,
                .terminal-prize {
                    grid-template-columns: 1fr;
                    row-gap: 0;
                }
                .terminal-list > div:nth-child(2n),
                .terminal-prize .amount,
                .terminal-prize .detail {
                    padding-left: 18px;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .mark *,
                .cmd,
                .terminal-shell,
                .stats,
                .cube {
                    animation: none !important;
                    transition: none !important;
                }
                .mark .guides,
                .mark .arch,
                .mark .nodes circle,
                .cmd,
                .terminal-shell,
                .stats {
                    opacity: 1;
                    transform: none;
                }
            }
        </style>
    </head>
    <body>
        <div id="term">
            <div class="wrap">
                <svg class="mark" viewBox="0 0 400 400" aria-label="arcus">
                    <g class="guides">
                        <rect x="60" y="60" width="280" height="280" />
                        <circle cx="200" cy="200" r="140" />
                        <circle class="spin" cx="200" cy="200" r="99" />
                        <line x1="200" y1="60" x2="200" y2="340" />
                        <line x1="60" y1="200" x2="340" y2="200" />
                        <line x1="130" y1="60" x2="130" y2="340" />
                        <line x1="270" y1="60" x2="270" y2="340" />
                        <line x1="60" y1="60" x2="340" y2="340" />
                        <line x1="340" y1="60" x2="60" y2="340" />
                    </g>

                    <g class="build">
                        <!-- the arch: two legs rising to a semicircular crown -->
                        <path
                            class="arch"
                            d="M101 300 L101 200 A99 99 0 0 1 299 200 L299 300"
                        />
                        <g class="nodes">
                            <circle cx="200" cy="101" r="15" />
                            <!-- crown / keystone -->
                            <circle cx="101" cy="200" r="13" />
                            <!-- left springline -->
                            <circle cx="299" cy="200" r="13" />
                            <!-- right springline -->
                            <circle cx="101" cy="300" r="13" />
                            <!-- left base -->
                            <circle cx="299" cy="300" r="13" />
                            <!-- right base -->
                        </g>
                    </g>
                </svg>

                <div id="lines"></div>

                <!-- saved caret for reuse: <span class="ccur"></span> -->
                <div id="cmd" hidden></div>

                <div class="terminal-shell" id="terminalShell">
                    <div class="terminal-history" id="terminalHistory"></div>
                    <form class="terminal-input-row" id="terminalForm" autocomplete="off">
                        <span class="terminal-prompt">$</span>
                        <input
                            class="terminal-input"
                            id="terminalInput"
                            type="text"
                            inputmode="text"
                            spellcheck="false"
                            aria-label="terminal command"
                            placeholder="help"
                        />
                    </form>
                </div>
            </div>
        </div>

                function startCountdown() {
                    if (!timeEl) return;
                    const tick = () => {
                        const diff = Math.max(0, COUNTDOWN_DEADLINE - Date.now());
                        const days = Math.floor(diff / 8.64e7);
                        const h = Math.floor((diff % 8.64e7) / 3.6e6);
                        const m = Math.floor((diff % 3.6e6) / 6e4);
                        const s = Math.floor((diff % 6e4) / 1000);
                        timeEl.textContent =
                            (days > 0 ? days + "d " : "") +
                            pad(h) + ":" + pad(m) + ":" + pad(s);
                        if (diff > 0) setTimeout(tick, 1000);
                    };
                    tick();
                }

                // append a ">" info line with an aligned label + white value
                function infoLine(label, valueHTML) {
                    const div = document.createElement("div");
                    div.className = "line info";
                    div.innerHTML =
                        '<span class="pl">&gt;</span> ' +
                        '<span class="k">' + label + "</span>" +
                        '<span class="v">' + valueHTML + "</span>";
                    linesEl.appendChild(div);
                    return div;
                }

                function normalizeCommand(value) {
                    return value.trim().replace(/^\/+/, "").replace(/\s+/g, " ").toLowerCase();
                }

                function normalizeAugustaVariant(value) {
                    return value.replace(/[^a-z0-9]/g, "");
                }

                function isAugustaEasterEgg(value) {
                    const compact = normalizeAugustaVariant(value);
                    return compact === "augusta" || compact === "augustalabs";
                }

                function clearAsciiTimers() {
                    while (asciiTimers.length) {
                        clearInterval(asciiTimers.pop());
                    }
                }

                function appendEcho(value) {
                    const row = document.createElement("div");
                    row.className = "terminal-echo";
                    row.innerHTML =
                        '<span class="terminal-prompt">$</span>' +
                        '<span class="terminal-command"></span>';
                    row.querySelector(".terminal-command").textContent = value;
                    terminalHistory.appendChild(row);
                }

                function appendOutput(render) {
                    const block = document.createElement("div");
                    block.className = "terminal-output";
                    render(block);
                    terminalHistory.appendChild(block);
                }

                function scrollToTerminalEnd() {
                    requestAnimationFrame(() => {
                        termEl.scrollTop = termEl.scrollHeight;
                        window.scrollTo(0, document.documentElement.scrollHeight);
                    });
                }

                function renderHeading(parent, title) {
                    const heading = document.createElement("div");
                    heading.className = "terminal-heading";
                    heading.innerHTML = title.startsWith("/")
                        ? '<span class="slash">/</span>' + title.slice(1)
                        : title;
                    parent.appendChild(heading);
                }

                function renderHelp(parent) {
                    const list = document.createElement("div");
                    list.className = "terminal-list";
                    HELP_ROWS.forEach(([name, description]) => {
                        const left = document.createElement("div");
                        left.className = "cmd-name";
                        left.textContent = name;
                        const right = document.createElement("div");
                        right.textContent = description;
                        list.append(left, right);
                    });
                    parent.appendChild(list);
                    const note = document.createElement("div");
                    note.className = "terminal-note";
                    note.textContent = "type any command for details";
                    parent.appendChild(note);
                }

                function renderCommand(parent, command) {
                    const block = document.createElement("div");
                    block.className = "terminal-block";
                    if (command.prizes) {
                        command.prizes.forEach(([label, amount, detail]) => {
                            const line = document.createElement("div");
                            line.className = "terminal-line terminal-prize";
                            line.innerHTML =
                                '<span><span class="pl">&gt;</span>' + label + "</span>" +
                                '<span class="amount">' + amount + "</span>" +
                                '<span class="detail">' + detail + "</span>";
                            block.appendChild(line);
                        });
                    } else {
                        command.lines.forEach((text) => {
                            const line = document.createElement("div");
                            line.className = "terminal-line";
                            if (text === SSH_COMMAND) {
                                line.classList.add("ssh-copy");
                                const pl = document.createElement("span");
                                pl.className = "pl";
                                pl.textContent = ">";
                                const tx = document.createElement("span");
                                tx.className = "tx";
                                tx.textContent = text;
                                line.append(pl, " ", tx);
                                wireSshCopyLine(line);
                                block.appendChild(line);
                                return;
                            }
                            if (text.startsWith("  1. write-up")) {
                                line.innerHTML =
                                    '<span class="pl">&gt;</span>  1. <span class="w">write-up</span>    how you got there       (required)';
                                block.appendChild(line);
                                return;
                            }
                            if (text.startsWith("  2. proof")) {
                                line.innerHTML =
                                    '<span class="pl">&gt;</span>  2. <span class="w">proof</span>       id from correct flag    (optional)';
                                block.appendChild(line);
                                return;
                            }
                            if (text.includes("arcus@augustalabs.ai")) {
                                line.innerHTML =
                                    '<span class="pl">&gt;</span>' +
                                    text.replace(
                                        "arcus@augustalabs.ai",
                                        '<span class="w">arcus@augustalabs.ai</span>'
                                    );
                                block.appendChild(line);
                                return;
                            }
                            line.innerHTML = '<span class="pl">&gt;</span>' + text;
                            block.appendChild(line);
                        });
                    }
                    parent.appendChild(block);
                }

                function renderAugustaLogo(parent) {
                    const art = document.createElement("pre");
                    art.className = "terminal-ascii";
                    art.textContent = AUGUSTA_LOGO_FRAMES[0];
                    parent.appendChild(art);

                    let frame = 0;
                    const timer = setInterval(() => {
                        if (!art.isConnected) {
                            clearInterval(timer);
                            return;
                        }
                        frame = (frame + 1) % AUGUSTA_LOGO_FRAMES.length;
                        art.textContent = AUGUSTA_LOGO_FRAMES[frame];
                    }, 120);
                    asciiTimers.push(timer);
                }

                function runTerminalCommand(rawValue) {
                    const raw = rawValue.trim();
                    if (!raw) return;
                    const normalized = normalizeCommand(raw);
                    terminalInput.value = "";

                    if (normalized === "clear") {
                        clearAsciiTimers();
                        terminalHistory.innerHTML = "";
                        scrollToTerminalEnd();
                        return;
                    }

                    appendEcho(raw);

                    if (normalized === "help") {
                        appendOutput(renderHelp);
                    } else if (isAugustaEasterEgg(normalized)) {
                        appendOutput(renderAugustaLogo);
                    } else if (COMMANDS[normalized]) {
                        appendOutput((parent) => renderCommand(parent, COMMANDS[normalized]));
                    } else if (normalized === "whois") {
                        appendOutput((parent) => renderCommand(parent, COMMANDS["whois augustalabs"]));
                    } else {
                        appendOutput((parent) => {
                            const line = document.createElement("div");
                            line.className = "terminal-line terminal-error";
                            line.textContent = "command not found: " + raw;
                            parent.appendChild(line);
                            const note = document.createElement("div");
                            note.className = "terminal-note";
                            note.textContent = "run help to list available commands";
                            parent.appendChild(note);
                        });
                    }

                    scrollToTerminalEnd();
                }

                async function typeLine(target, html, speed) {
                    const tmp = document.createElement("div");
                    tmp.innerHTML = html;
                    const plain = tmp.textContent;
                    const cursor = document.createElement("span");
                    cursor.className = "cursor";
                    target.appendChild(cursor);
                    for (const ch of plain) {
                        cursor.insertAdjacentText("beforebegin", ch);
                        await wait(speed);
                    }
                    cursor.remove();
                    target.innerHTML = html;
                }

                async function run() {
                    await wait(1500);
                    for (const item of LINES) {
                        const div = document.createElement("div");
                        div.className =
                            "line" + (item.cls ? " " + item.cls : "");
                        const pl = document.createElement("span");
                        pl.className = "pl";
                        pl.textContent = item.pl || ">";
                        const tx = document.createElement("span");
                        tx.className = "tx";
                        div.append(pl, " ", tx);
                        linesEl.appendChild(div);
                        await typeLine(tx, item.t, 16);
                        if (item.copy) {
                            sshCopyLine = div;
                            wireSshCopyLine(div);
                        }
                        await wait(item.cls === "title" ? 260 : 120);
                    }
                    // prize + live countdown as two more terminal lines
                    await wait(120);
                    infoLine("prize", "3000€");
                    await wait(120);
                    const timeRow = infoLine("time left", '<span id="timeleft">--:--:--</span>');
                    timeEl = timeRow.querySelector("#timeleft");
                    startCountdown();

                    await wait(420);
                    terminalShell.classList.add("show");
                    terminalInput.focus({ preventScroll: true });
                }

                // click the ssh line to copy it
                function wireSshCopyLine(line) {
                    const hint = document.createElement("span");
                    hint.className = "hint";
                    hint.textContent = "# copy to clipboard";
                    line.appendChild(hint);
                    line.addEventListener("click", () => copyCommand(line));
                    line.addEventListener("mouseleave", () => {
                        line.classList.remove("copy-cooldown");
                    });
                }

                async function copyCommand(targetLine = sshCopyLine) {
                    try {
                        await navigator.clipboard.writeText(SSH_COMMAND);
                    } catch (e) {
                        const ta = document.createElement("textarea");
                        ta.value = SSH_COMMAND;
                        ta.style.position = "fixed";
                        ta.style.opacity = "0";
                        document.body.appendChild(ta);
                        ta.select();
                        try {
                            document.execCommand("copy");
                        } catch (_) {}
                        ta.remove();
                    }
                    if (!targetLine) return;
                    const hint = targetLine.querySelector(".hint");
                    if (hint) hint.textContent = "# copied";
                    targetLine.classList.add("copied");
                    clearTimeout(targetLine._copyTimer);
                    targetLine._copyTimer = setTimeout(() => {
                        targetLine.classList.remove("copied");
                        targetLine.classList.add("copy-cooldown");
                        clearTimeout(targetLine._resetTimer);
                        targetLine._resetTimer = setTimeout(() => {
                            if (hint) hint.textContent = "# copy to clipboard";
                        }, 220);
                    }, 900);
                }

                terminalForm.addEventListener("submit", (event) => {
                    event.preventDefault();
                    runTerminalCommand(terminalInput.value);
                });
                terminalInput.addEventListener("keydown", (event) => {
                    if (event.key !== "Enter") return;
                    event.preventDefault();
                    runTerminalCommand(terminalInput.value);
                });
                terminalShell.addEventListener("click", () => {
                    terminalInput.focus();
                });

                run();
            })();
        </script>
    </body>
</html>
